<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaRemote LED Player</title>
    <link rel="stylesheet" href="app.css?v=7">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            cursor: none; /* Hide cursor on the LED screen */
        }
    </style>
</head>
<body class="player-body">
    <div id="playerContainer" style="width: 100%; height: 100%; position: absolute; top: 0; left: 0; overflow: hidden; background: #000;">
        <!-- Blackout Screen Overlay -->
        <div id="blackout" class="player-blackout"></div>

        <!-- Diagnostic Overlay (Subtle text in bottom-right corner) -->
        <div id="diagOverlay" style="position: absolute; bottom: 8px; right: 8px; font-family: sans-serif; font-size: 0.65rem; color: rgba(255,255,255,0.15); z-index: 10000; pointer-events: none; text-shadow: 1px 1px 1px rgba(0,0,0,0.8);">
            [Screen: <span id="diagScreenId">loading</span> | WS: <span id="diagWsStatus">connecting</span>]
        </div>

        <!-- Media containers -->
        <img id="imgContainer" class="player-media" style="display: none;">
        <video id="vidContainer" class="player-media" style="display: none;" autoplay muted></video>

        <!-- Dome Temperature Slide -->
        <div id="tempContainer" class="temp-slide-layout" style="display: none;">
            <!-- Left Grid (Outdoor card by default, holds both when stacked in Option 2) -->
            <div id="tempLeftGrid" class="temp-grid grid-left">
                <div class="temp-card outdoor-card">
                    <div id="outdoorLabel" class="temp-label">Outdoor Temperature</div>
                    <div class="temp-value">
                        <span id="outdoorVal">--</span><span class="temp-unit">°C</span>
                    </div>
                </div>
            </div>

            <!-- Centered Logo -->
            <div class="temp-header">
                <img src="/logo_white.png" class="temp-logo" alt="The Dome">
            </div>

            <!-- Right Grid (Main Hall card by default, hidden when stacked in Option 2) -->
            <div id="tempRightGrid" class="temp-grid grid-right">
                <div class="temp-card hall-card">
                    <div id="hallLabel" class="temp-label">Main Hall Temperature</div>
                    <div class="temp-value">
                        <span id="hallVal">--</span><span class="temp-unit">°C</span>
                    </div>
                </div>
            </div>
            
            <!-- Graph container on the right side -->
            <div id="tempGraphContainer" class="temp-graph-container" style="display: none;">
                <div class="temp-graph-title">Indoor Temperature History (24h)</div>
                <svg id="tempGraphSvg" class="temp-graph-svg"></svg>
            </div>

            <div class="temp-footer" id="tempTime">
                Updated: Just now
            </div>
        </div>

        <!-- Ticker Marquee Overlay -->
        <div id="ticker" class="player-ticker" style="display: none;">
            <span id="tickerText" class="player-ticker-text"></span>
        </div>
    </div>

    <script>
        let styleOverrideElement = null;

        function applyDimensions(width, height) {
            if (!width || !height) return;
            const container = document.getElementById('playerContainer');
            if (container) {
                container.style.width = width + 'px';
                container.style.height = height + 'px';

                if (screenId === 'default') {
                    // Reset to original absolute positioning for Big LED Screen (no scaling/centering)
                    container.style.transform = '';
                    container.style.transformOrigin = '';
                    container.style.left = '0px';
                    container.style.top = '0px';
                    container.style.position = 'absolute';
                } else {
                    // Scale other screens (like Hotel Screen) to fit the physical viewport width and height
                    const winW = window.innerWidth;
                    const winH = window.innerHeight;
                    const scale = Math.min(winW / width, winH / height);

                    container.style.transform = `scale(${scale})`;
                    container.style.transformOrigin = 'top left';

                    // Center the container vertically and horizontally
                    container.style.left = ((winW - width * scale) / 2) + 'px';
                    container.style.top = ((winH - height * scale) / 2) + 'px';
                    container.style.position = 'absolute';
                }
            }

            // Remove old override if exists to prevent duplication
            if (styleOverrideElement) {
                styleOverrideElement.remove();
                styleOverrideElement = null;
            }

            const hVal = parseInt(height);
            const wVal = parseInt(width);
            const tempContainer = document.getElementById('tempContainer');
            if (hVal >= 500) {
                if (tempContainer) {
                    if (wVal >= hVal) {
                        tempContainer.classList.add('layout-widescreen');
                        tempContainer.classList.remove('layout-portrait');
                    } else {
                        tempContainer.classList.add('layout-portrait');
                        tempContainer.classList.remove('layout-widescreen');
                    }
                }
            } else {
                if (tempContainer) {
                    tempContainer.classList.remove('layout-widescreen');
                    tempContainer.classList.remove('layout-portrait');
                }
            }
            if (hVal < 500) {
                styleOverrideElement = document.createElement('style');
                if (hVal >= 350) {
                    // Compact vertical layout
                    styleOverrideElement.textContent = `
                        .temp-slide-layout { padding: 1.5rem 2rem !important; }
                        .temp-grid { gap: 1.5rem !important; }
                        .temp-card { padding: 1.25rem 2rem !important; border-radius: 16px !important; }
                        .temp-label { font-size: 1rem !important; margin-bottom: 0.5rem !important; }
                        .temp-value { font-size: 3.5rem !important; }
                        .temp-unit { font-size: 1.75rem !important; }
                        .temp-logo { width: 30vw !important; max-width: 250px !important; }
                        .player-ticker-text { font-size: 1.8rem !important; }
                        .player-ticker { padding: 0.75rem 0 !important; }
                        
                        /* Graph layout overrides */
                        .temp-slide-layout.with-graph { flex-direction: row !important; flex-wrap: wrap !important; padding: 2rem !important; }
                        .temp-slide-layout.with-graph .temp-header { width: 100% !important; margin-bottom: 1rem !important; }
                        .temp-slide-layout.with-graph .temp-grid { width: 45% !important; flex-direction: column !important; gap: 1.5rem !important; }
                        .temp-slide-layout.with-graph .temp-card { padding: 1.5rem 1.5rem !important; }
                        .temp-slide-layout.with-graph .temp-graph-container { display: flex !important; width: 50% !important; height: 320px !important; }
                    `;
                } else if (hVal >= 220) {
                    // Widescreen horizontal banner layout (for 220px to 350px, e.g. 1280x256)
                    styleOverrideElement.textContent = `
                        .temp-slide-layout { 
                            flex-direction: row !important; 
                            justify-content: space-between !important; 
                            align-items: center !important; 
                            padding: 1rem 3rem !important; 
                        }
                        .temp-header { 
                            width: 25% !important; 
                            margin: 0 !important; 
                            display: flex !important; 
                            justify-content: center !important; 
                        }
                        .temp-logo { 
                            width: 100% !important; 
                            max-width: 220px !important; 
                            height: auto !important; 
                            margin: 0 !important;
                        }
                        .temp-grid { 
                            width: 35% !important; 
                            display: flex !important;
                            justify-content: center !important;
                            padding: 0 !important; 
                            margin: 0 !important; 
                        }
                        .temp-card { 
                            padding: 0.75rem 1.5rem !important; 
                            border-radius: 16px !important; 
                            width: 100% !important;
                            max-width: 240px !important;
                            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5) !important;
                        }
                        .temp-label { 
                            font-size: 0.8rem !important; 
                            margin-bottom: 0.25rem !important; 
                            letter-spacing: 1px !important; 
                        }
                        .temp-value { 
                            font-size: 2.8rem !important; 
                        }
                        .temp-unit { 
                            font-size: 1.4rem !important; 
                        }
                        .player-ticker-text { 
                            font-size: 1.6rem !important; 
                        }
                        .player-ticker { 
                            padding: 0.5rem 0 !important; 
                        }
                        .temp-footer {
                            display: none !important; 
                        }
                        
                        /* Graph layout overrides */
                        .temp-slide-layout.with-graph { flex-direction: row !important; justify-content: space-between !important; align-items: center !important; padding: 1rem 2rem !important; }
                        .temp-slide-layout.with-graph .temp-grid.grid-left { width: 32% !important; flex-direction: column !important; gap: 0.6rem !important; display: flex !important; }
                        .temp-slide-layout.with-graph .temp-card { width: 100% !important; max-width: none !important; flex-direction: row !important; justify-content: space-between !important; align-items: center !important; padding: 0.5rem 1.25rem !important; border-radius: 12px !important; }
                        .temp-slide-layout.with-graph .temp-label { font-size: 0.75rem !important; margin: 0 !important; text-align: left !important; }
                        .temp-slide-layout.with-graph .temp-value { font-size: 2.2rem !important; }
                        .temp-slide-layout.with-graph .temp-unit { font-size: 1.1rem !important; }
                        .temp-slide-layout.with-graph .temp-header { width: 15% !important; margin: 0 !important; }
                        .temp-slide-layout.with-graph .temp-logo { max-width: 130px !important; }
                        .temp-slide-layout.with-graph .temp-graph-container { display: flex !important; width: 48% !important; height: 210px !important; padding: 0.8rem 1rem !important; }
                    `;
                } else {
                    // Ultra-compact horizontal banner layout (for under 220px, e.g. 960x192)
                    styleOverrideElement.textContent = `
                        .temp-slide-layout { 
                            flex-direction: row !important; 
                            justify-content: space-between !important; 
                            align-items: center !important; 
                            padding: 0.5rem 3.5rem !important; 
                        }
                        .temp-header { 
                            width: 30% !important; 
                            margin: 0 !important; 
                            display: flex !important; 
                            justify-content: center !important; 
                        }
                        .temp-logo { 
                            width: 100% !important; 
                            max-width: 220px !important; 
                            height: auto !important; 
                            margin: 0 !important;
                        }
                        .temp-grid { 
                            width: 35% !important; 
                            display: flex !important;
                            justify-content: center !important;
                            padding: 0 !important; 
                            margin: 0 !important; 
                        }
                        .temp-card { 
                            padding: 0.4rem 1rem !important; 
                            border-radius: 12px !important; 
                            width: 100% !important;
                            max-width: 200px !important;
                            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.5) !important;
                        }
                        .temp-label { 
                            font-size: 0.7rem !important; 
                            margin-bottom: 0.15rem !important; 
                            letter-spacing: 0.5px !important; 
                        }
                        .temp-value { 
                            font-size: 2.2rem !important; 
                        }
                        .temp-unit { 
                            font-size: 1.1rem !important; 
                        }
                        .player-ticker-text { 
                            font-size: 1.3rem !important; 
                        }
                        .player-ticker { 
                            padding: 0.35rem 0 !important; 
                        }
                        .temp-footer {
                            display: none !important; 
                        }
                        
                        /* Graph layout overrides (LED Wall 960x192 stacked style) */
                        .temp-slide-layout.with-graph { flex-direction: row !important; justify-content: space-between !important; align-items: center !important; padding: 0.5rem 1.5rem !important; }
                        .temp-slide-layout.with-graph .temp-grid.grid-left { width: 32% !important; flex-direction: column !important; gap: 0.4rem !important; display: flex !important; }
                        .temp-slide-layout.with-graph .temp-card { width: 100% !important; max-width: none !important; flex-direction: row !important; justify-content: space-between !important; align-items: center !important; padding: 0.3rem 1rem !important; border-radius: 8px !important; }
                        .temp-slide-layout.with-graph .temp-label { font-size: 0.65rem !important; margin: 0 !important; text-align: left !important; }
                        .temp-slide-layout.with-graph .temp-value { font-size: 1.8rem !important; }
                        .temp-slide-layout.with-graph .temp-unit { font-size: 0.9rem !important; }
                        .temp-slide-layout.with-graph .temp-header { width: 16% !important; margin: 0 !important; }
                        .temp-slide-layout.with-graph .temp-logo { max-width: 110px !important; }
                        .temp-slide-layout.with-graph .temp-graph-container { display: flex !important; width: 48% !important; height: 165px !important; padding: 0.5rem 0.8rem !important; }
                    `;
                }
                document.head.appendChild(styleOverrideElement);
            }
        }

        // Parse startup width/height from URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const screenW = urlParams.get('width');
        const screenH = urlParams.get('height');
        const isPreview = urlParams.get('preview') === '1';
        if (screenW && screenH) {
            applyDimensions(screenW, screenH);
        }

        let ws;
        let currentState = null;
        let imageTimer = null;
        let videoSafetyTimer = null;
        let tempFetchInterval = null;
        let historyFetchInterval = null;
        let currentPlaylistIndex = -1;
        let currentItemFilename = null;
        let disconnectTime = null;
        let screenId = 'default';
        
        // Detect subpath prefix globally (e.g. /digital/)
        const pathParts = window.location.pathname.split('/');
        const pathPrefix = pathParts.slice(0, -1).filter(p => p && p !== 'player.html' && p !== 'index.html').join('/');
        const prefixStr = pathPrefix ? '/' + pathPrefix : '';
        
        // Active item configuration trackers
        let currentItemId = null;
        let currentBgTheme = null;
        let currentBoldFont = null;
        let currentShowGraph = null;
        let currentHistoryHours = null;

        const imgEl = document.getElementById('imgContainer');
        const vidEl = document.getElementById('vidContainer');
        const tempEl = document.getElementById('tempContainer');
        const blackoutEl = document.getElementById('blackout');
        const tickerEl = document.getElementById('ticker');
        const tickerTextEl = document.getElementById('tickerText');
        
        const outdoorValEl = document.getElementById('outdoorVal');
        const hallValEl = document.getElementById('hallVal');
        const tempTimeEl = document.getElementById('tempTime');

        // Automatically send NEXT command when video ends or fails
        vidEl.onended = () => {
            clearTimeout(videoSafetyTimer);
            videoSafetyTimer = null;
            if (!isPreview) sendAction('NEXT');
        };

        vidEl.onerror = () => {
            console.error('[PLAYER] Video playback error, skipping...');
            clearTimeout(videoSafetyTimer);
            videoSafetyTimer = null;
            if (!isPreview) sendAction('NEXT');
        };

        imgEl.onerror = () => {
            console.error('[PLAYER] Image loading error, skipping...');
            if (!isPreview) sendAction('NEXT');
        };

        function connectWebSocket() {
            const proto = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            // Parse screenId from URL query parameters
            const urlParams = new URLSearchParams(window.location.search);
            screenId = urlParams.get('screenId') || 'default';
            
            // Update diagnostic overlay Screen ID
            const diagScreen = document.getElementById('diagScreenId');
            if (diagScreen) diagScreen.innerText = screenId;

            const wsUrl = `${proto}//${window.location.host}${prefixStr}/?screenId=${screenId}`;
            
            console.log(`Connecting to WebSocket at: ${wsUrl}`);
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                console.log(`Player connected to server for screenId: ${screenId}`);
                const diagWs = document.getElementById('diagWsStatus');
                if (diagWs) {
                    diagWs.innerText = 'Connected';
                    diagWs.style.color = 'rgba(0, 255, 135, 0.5)';
                }
                if (disconnectTime && Date.now() - disconnectTime > 20000) {
                    console.log('Connection was lost for more than 20s. Reloading page to ensure latest assets...');
                    window.location.reload();
                    return;
                }
                disconnectTime = null;
            };

            ws.onclose = () => {
                console.log('Player connection lost. Reconnecting...');
                const diagWs = document.getElementById('diagWsStatus');
                if (diagWs) {
                    diagWs.innerText = 'Disconnected';
                    diagWs.style.color = 'rgba(255, 75, 75, 0.5)';
                }
                if (!disconnectTime) {
                    disconnectTime = Date.now();
                }
                setTimeout(connectWebSocket, 3000);
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === 'STATE_UPDATE') {
                    if (data.screenConfig) {
                        applyDimensions(data.screenConfig.width, data.screenConfig.height);
                    }
                    updatePlayer(data.state);
                    if (data.state && data.state.playlist) {
                        prefetchMedia(data.state.playlist);
                    }
                } else if (data.type === 'FORCE_RELOAD') {
                    console.log('Received FORCE_RELOAD command. Reloading page...');
                    window.location.reload(true);
                }
            };
        }

        function sendAction(type, payload = {}) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type, ...payload }));
            }
        }

        const prefetchedUrls = new Set();
        function prefetchMedia(playlist) {
            playlist.forEach(item => {
                if (item.filename && item.type !== 'temp') {
                    const fileUrl = `${prefixStr}/uploads/${item.filename}`;
                    if (!prefetchedUrls.has(fileUrl)) {
                        prefetchedUrls.add(fileUrl);
                        console.log(`[Prefetch] Pre-downloading: ${fileUrl}`);
                        fetch(fileUrl, { priority: 'low' })
                            .then(() => console.log(`[Prefetch] Cached: ${fileUrl}`))
                            .catch(err => console.warn(`[Prefetch] Error preloading ${fileUrl}:`, err));
                    }
                }
            });
        }

        function fetchTemps() {
            fetch(`${prefixStr}/api/temps`)
                .then(res => res.json())
                .then(data => {
                    if (data.outdoor !== undefined && data.outdoor !== null) {
                        outdoorValEl.innerText = parseFloat(data.outdoor).toFixed(1);
                    }
                    if (data.mainHall !== undefined && data.mainHall !== null) {
                        hallValEl.innerText = parseFloat(data.mainHall).toFixed(1);
                    }
                    const now = new Date();
                    tempTimeEl.innerText = `Updated: ${now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}`;
                })
                .catch(err => {
                    console.error('Error fetching temps:', err);
                    outdoorValEl.innerText = '--';
                    hallValEl.innerText = '--';
                });
        }

        function fetchAndDrawGraph(historyHours) {
            const hh = historyHours || 24;
            fetch(`${prefixStr}/api/temps/history`)
                .then(res => res.json())
                .then(data => {
                    const pointsCount = hh * 6;
                    const slicedData = data.slice(-pointsCount);
                    drawSvgGraph(slicedData, hh);
                })
                .catch(err => {
                    console.error('Error fetching temp history:', err);
                });
        }

        function drawSvgGraph(data, historyHours) {
            const svg = document.getElementById('tempGraphSvg');
            if (!svg) return;
            
            // Clear old elements
            svg.innerHTML = '';
            
            const hh = historyHours || 24;
            const titleEl = document.querySelector('.temp-graph-title');
            if (titleEl) {
                titleEl.textContent = `Indoor Temperature History (${hh}h)`;
            }
            
            if (!data || data.length === 0) {
                const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                text.setAttribute('x', '50%');
                text.setAttribute('y', '50%');
                text.setAttribute('text-anchor', 'middle');
                text.setAttribute('fill', 'rgba(255,255,255,0.4)');
                text.setAttribute('font-size', '11');
                text.textContent = 'No historical data available';
                svg.appendChild(text);
                return;
            }
            
            const svgW = svg.clientWidth || 400;
            const svgH = svg.clientHeight || 150;
            const paddingLeft = 32;
            const paddingRight = 10;
            const paddingTop = 15;
            const paddingBottom = 20;
            
            const chartW = svgW - paddingLeft - paddingRight;
            const chartH = svgH - paddingTop - paddingBottom;
            
            const values = data.map(d => d.value);
            let maxVal = Math.max(...values);
            let minVal = Math.min(...values);
            
            if (maxVal === minVal) {
                maxVal += 1;
                minVal -= 1;
            } else {
                const diff = maxVal - minVal;
                maxVal += diff * 0.15;
                minVal -= diff * 0.15;
            }
            
            const gridCount = 3;
            for (let i = 0; i <= gridCount; i++) {
                const yVal = minVal + (maxVal - minVal) * (i / gridCount);
                const yPos = svgH - paddingBottom - (chartH * (i / gridCount));
                
                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', paddingLeft);
                line.setAttribute('y1', yPos);
                line.setAttribute('x2', svgW - paddingRight);
                line.setAttribute('y2', yPos);
                line.setAttribute('stroke', 'rgba(255,255,255,0.06)');
                line.setAttribute('stroke-width', '1');
                svg.appendChild(line);
                
                const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                text.setAttribute('x', paddingLeft - 6);
                text.setAttribute('y', yPos + 3);
                text.setAttribute('text-anchor', 'end');
                text.setAttribute('fill', 'rgba(255,255,255,0.5)');
                text.setAttribute('font-size', '9');
                text.setAttribute('font-weight', '700');
                text.textContent = yVal.toFixed(1) + '°';
                svg.appendChild(text);
            }
            
            const points = data.map((d, index) => {
                const xPos = paddingLeft + (chartW * (index / (data.length - 1)));
                const yPos = svgH - paddingBottom - (chartH * ((d.value - minVal) / (maxVal - minVal)));
                return { x: xPos, y: yPos, time: d.time, value: d.value };
            });
            
            let areaPathStr = `M ${points[0].x} ${svgH - paddingBottom} `;
            points.forEach(p => {
                areaPathStr += `L ${p.x} ${p.y} `;
            });
            areaPathStr += `L ${points[points.length - 1].x} ${svgH - paddingBottom} Z`;
            
            let defs = svg.querySelector('defs');
            if (!defs) {
                defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
                svg.appendChild(defs);
            }
            
            const gradId = 'tempAreaGradient';
            let grad = document.getElementById(gradId);
            if (!grad) {
                grad = document.createElementNS('http://www.w3.org/2000/svg', 'linearGradient');
                grad.setAttribute('id', gradId);
                grad.setAttribute('x1', '0%');
                grad.setAttribute('y1', '0%');
                grad.setAttribute('x2', '0%');
                grad.setAttribute('y2', '100%');
                
                const stop1 = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
                stop1.setAttribute('offset', '0%');
                stop1.setAttribute('stop-color', '#00d2ff');
                stop1.setAttribute('stop-opacity', '0.25');
                
                const stop2 = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
                stop2.setAttribute('offset', '100%');
                stop2.setAttribute('stop-color', '#00d2ff');
                stop2.setAttribute('stop-opacity', '0.00');
                
                grad.appendChild(stop1);
                grad.appendChild(stop2);
                defs.appendChild(grad);
            }
            
            const areaPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            areaPath.setAttribute('d', areaPathStr);
            areaPath.setAttribute('fill', `url(#${gradId})`);
            svg.appendChild(areaPath);
            
            let linePathStr = `M ${points[0].x} ${points[0].y} `;
            for (let i = 1; i < points.length; i++) {
                linePathStr += `L ${points[i].x} ${points[i].y} `;
            }
            
            const linePath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            linePath.setAttribute('d', linePathStr);
            linePath.setAttribute('fill', 'none');
            linePath.setAttribute('stroke', '#00d2ff');
            linePath.setAttribute('stroke-width', '2');
            linePath.setAttribute('stroke-linecap', 'round');
            linePath.setAttribute('stroke-linejoin', 'round');
            linePath.setAttribute('filter', 'drop-shadow(0 0 3px rgba(0,210,255,0.4))');
            svg.appendChild(linePath);
            
            const timeLabelsCount = 4;
            const step = Math.floor((points.length - 1) / (timeLabelsCount - 1));
            for (let i = 0; i < timeLabelsCount; i++) {
                const index = Math.min(i * step, points.length - 1);
                const p = points[index];
                const tStr = p.time.split(' ')[1] ? p.time.split(' ')[1].substring(0, 5) : '';
                
                const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                text.setAttribute('x', p.x);
                text.setAttribute('y', svgH - 4);
                text.setAttribute('text-anchor', i === 0 ? 'start' : (i === timeLabelsCount - 1 ? 'end' : 'middle'));
                text.setAttribute('fill', 'rgba(255,255,255,0.4)');
                text.setAttribute('font-size', '9');
                text.setAttribute('font-weight', '700');
                text.textContent = tStr;
                svg.appendChild(text);
            }
        }

        function updatePlayer(state) {
            currentState = state;
            
            const item = (state.currentIndex >= 0 && state.currentIndex < state.playlist.length) 
                ? state.playlist[state.currentIndex] 
                : null;
            
            const itemId = item ? item.id : null;
            const hasItemChanged = !item || (currentItemId !== itemId) || (currentPlaylistIndex !== state.currentIndex);
            
            if (hasItemChanged) {
                clearTimeout(imageTimer);
                clearTimeout(videoSafetyTimer);
                videoSafetyTimer = null;
                imageTimer = null;
                
                clearInterval(tempFetchInterval);
                clearInterval(historyFetchInterval);
                tempFetchInterval = null;
                historyFetchInterval = null;
                
                currentItemId = itemId;
                currentItemFilename = item ? item.filename : null;
                currentPlaylistIndex = state.currentIndex;
            }
 
            // Handle Blackout
            if (state.isBlackout) {
                blackoutEl.classList.add('active');
            } else {
                blackoutEl.classList.remove('active');
            }
 
            // Sync Ticker
            if (state.ticker.enabled && !state.isBlackout) {
                tickerEl.style.display = 'block';
                tickerTextEl.innerText = state.ticker.text;
                tickerTextEl.style.color = state.ticker.color;
                
                // Convert 1-10 speed to marquee animation duration
                const animDuration = (35 - (state.ticker.speed * 3)) + 's';
                tickerTextEl.style.animationDuration = animDuration;
            } else {
                tickerEl.style.display = 'none';
            }
 
            // Verify if there is media to display
            if (state.currentIndex >= 0 && state.currentIndex < state.playlist.length) {
                const item = state.playlist[state.currentIndex];
                const mediaUrl = `${prefixStr}/uploads/${item.filename}`;
 
                if (item.type === 'image') {
                    // Hide other containers
                    vidEl.style.display = 'none';
                    vidEl.pause();
                    vidEl.removeAttribute('src');
                    tempEl.style.display = 'none';
 
                    imgEl.src = mediaUrl;
                    imgEl.style.display = 'block';
 
                    // Slideshow timer for images
                    if (state.isPlaying && !state.isBlackout && !isPreview) {
                        if (imageTimer === null) {
                            const durationMs = (item.duration || 10) * 1000;
                            imageTimer = setTimeout(() => {
                                sendAction('NEXT');
                            }, durationMs);
                        }
                    } else {
                        if (imageTimer !== null) {
                            clearTimeout(imageTimer);
                            imageTimer = null;
                        }
                    }
                } else if (item.type === 'video') {
                    // Hide other containers
                    imgEl.style.display = 'none';
                    imgEl.removeAttribute('src');
                    tempEl.style.display = 'none';
 
                    if (vidEl.src.endsWith(item.filename) && vidEl.ended && state.isPlaying && !state.isBlackout && !isPreview) {
                        console.log('[PLAYER] Video already ended while offline. Requesting NEXT...');
                        clearTimeout(videoSafetyTimer);
                        videoSafetyTimer = null;
                        sendAction('NEXT');
                    }
 
                    if (!vidEl.src.endsWith(item.filename)) {
                        clearTimeout(videoSafetyTimer);
                        videoSafetyTimer = null;
                        vidEl.src = mediaUrl;
 
                        // Set up safety timer once metadata loads or immediately as fallback
                        const setSafetyTimer = (duration) => {
                            clearTimeout(videoSafetyTimer);
                            if (isPreview) return; // Do not schedule safety timer in preview
                            const finalDuration = duration || item.duration || 15;
                            videoSafetyTimer = setTimeout(() => {
                                console.warn('[PLAYER] Video safety timeout. Skipping...');
                                sendAction('NEXT');
                            }, (finalDuration + 5) * 1000);
                        };
 
                        vidEl.onloadedmetadata = () => {
                            setSafetyTimer(vidEl.duration);
                        };
 
                        // Fallback safety timer if metadata fails to load
                        setSafetyTimer(item.duration || 15);
                    }
                    vidEl.style.display = 'block';
 
                    // Audio volume sync
                    vidEl.volume = state.volume;
                    vidEl.muted = (state.volume === 0) || (item.muted === true);
 
                    // Play/Pause sync
                    if (state.isPlaying && !state.isBlackout) {
                        // Re-start safety timer if it was cleared and we are resuming
                        if (!videoSafetyTimer && !isPreview) {
                            const duration = vidEl.duration || item.duration || 15;
                            videoSafetyTimer = setTimeout(() => {
                                console.warn('[PLAYER] Video safety timeout. Skipping...');
                                sendAction('NEXT');
                            }, (duration + 5) * 1000);
                        }
                        vidEl.play().catch(err => {
                            console.log('Video play start blocked, relying on safety timer:', err);
                        });
                    } else {
                        vidEl.pause();
                        clearTimeout(videoSafetyTimer);
                        videoSafetyTimer = null;
                    }
                } else if (item.type === 'temp') {
                    // Hide media elements
                    imgEl.style.display = 'none';
                    imgEl.removeAttribute('src');
                    vidEl.style.display = 'none';
                    vidEl.pause();
                    vidEl.removeAttribute('src');
 
                    // Show Temperature Display
                    document.getElementById('outdoorLabel').innerText = item.label1 || 'Outdoor Temperature';
                    document.getElementById('hallLabel').innerText = item.label2 || 'Main Hall Temperature';
 
                    // Reset theme class names on tempEl if changed
                    const theme = item.bgTheme || 'dome';
                    if (currentBgTheme !== theme || hasItemChanged) {
                        tempEl.className = 'temp-slide-layout';
                        tempEl.classList.add(`theme-${theme}`);
                        currentBgTheme = theme;
                    }
 
                    // Toggle bold font styling if changed
                    if (currentBoldFont !== !!item.boldFont || hasItemChanged) {
                        if (item.boldFont) {
                            tempEl.classList.add('bold-fonts');
                        } else {
                            tempEl.classList.remove('bold-fonts');
                        }
                        currentBoldFont = !!item.boldFont;
                    }

                    if (tempFetchInterval === null) {
                        tempEl.style.display = 'flex';
                        fetchTemps();
                        // Fetch fresh temperatures every 10 seconds while this slide is active
                        tempFetchInterval = setInterval(fetchTemps, 10000);
                    }
 
                    // Toggle graph layout / update intervals if changed
                    const graphContainer = document.getElementById('tempGraphContainer');
                    const showGraph = !!item.showGraph;
                    const hh = item.historyHours || 24;
                    
                    if (currentShowGraph !== showGraph || currentHistoryHours !== hh || hasItemChanged) {
                        // Always clear the existing interval if we are resetting/changing
                        if (historyFetchInterval) {
                            clearInterval(historyFetchInterval);
                            historyFetchInterval = null;
                        }
 
                        const leftGrid = document.getElementById('tempLeftGrid');
                        const rightGrid = document.getElementById('tempRightGrid');
                        const hallCard = document.querySelector('.hall-card');

                        if (showGraph) {
                            tempEl.classList.add('with-graph');
                            if (graphContainer) graphContainer.style.display = 'flex';
                            if (rightGrid) rightGrid.style.display = 'none';
                            if (leftGrid && hallCard) leftGrid.appendChild(hallCard);
                            
                            // Initial fetch & draw (deferred to let browser apply layout dimensions)
                            setTimeout(() => {
                                fetchAndDrawGraph(hh);
                            }, 100);
                            
                            // Refresh graph every minute
                            historyFetchInterval = setInterval(() => fetchAndDrawGraph(hh), 60000);
                        } else {
                            tempEl.classList.remove('with-graph');
                            if (graphContainer) graphContainer.style.display = 'none';
                            if (rightGrid && hallCard) {
                                rightGrid.appendChild(hallCard);
                                rightGrid.style.display = 'flex';
                            }
                        }
                        currentShowGraph = showGraph;
                        currentHistoryHours = hh;
                    }
 
                    // Slideshow timer for temperatures
                    if (state.isPlaying && !state.isBlackout && !isPreview) {
                        if (imageTimer === null) {
                            const durationMs = (item.duration || 15) * 1000;
                            imageTimer = setTimeout(() => {
                                sendAction('NEXT');
                            }, durationMs);
                        }
                    } else {
                        if (imageTimer !== null) {
                            clearTimeout(imageTimer);
                            imageTimer = null;
                        }
                    }
                }
            } else {
                // Clear display
                imgEl.style.display = 'none';
                imgEl.removeAttribute('src');
                vidEl.style.display = 'none';
                vidEl.pause();
                vidEl.removeAttribute('src');
                tempEl.style.display = 'none';
            }
        }

        // Initialize connection
        connectWebSocket();

        // Listen for window resize to adjust scaling dynamically
        window.addEventListener('resize', () => {
            if (currentState && currentState.width && currentState.height) {
                applyDimensions(currentState.width, currentState.height);
            } else if (currentState) {
                const screenW = currentState.width || 960;
                const screenH = currentState.height || 192;
                applyDimensions(screenW, screenH);
            }
        });

        // Manage diagnostic overlay visibility (hide in preview, fade out in play mode)
        const diagOverlay = document.getElementById('diagOverlay');
        if (isPreview) {
            if (diagOverlay) diagOverlay.style.display = 'none';
        } else {
            setTimeout(() => {
                if (diagOverlay) {
                    diagOverlay.style.transition = 'opacity 1.5s ease';
                    diagOverlay.style.opacity = '0';
                    setTimeout(() => {
                        diagOverlay.style.display = 'none';
                    }, 1500);
                }
            }, 8000); // Fade out after 8 seconds
        }
    </script>
</body>
</html>
